<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고전문학 연구 아카이브</title>
    <style>
        body {
            font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fcfcfc;
        }
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid #2c3e50;
            margin-bottom: 40px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        h2 {
            color: #34495e;
            border-left: 4px solid #3498db;
            padding-left: 10px;
            margin-top: 40px;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 1.1em;
        }
        .paper-list {
            list-style-type: none;
            padding: 0;
        }
        .paper-item {
            background: #fff;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 3px solid #ecf0f1;
            transition: transform 0.2s;
        }
        .paper-item:hover {
            transform: translateX(5px);
            border-left-color: #3498db;
        }
        .paper-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #2980b9;
            text-decoration: none;
        }
        .paper-title:hover {
            text-decoration: underline;
        }
        .paper-meta {
            font-size: 0.9em;
            color: #95a5a6;
            margin-top: 5px;
        }
        .paper-abstract {
            margin-top: 10px;
            font-size: 0.95em;
            color: #555;
        }
    </style>
</head>
<body>

    <header>
        <h1>연구자 이름</h1>
        <div class="subtitle">한국고전문학 연구 아카이브</div>
    </header>

    <section id="about">
        <h2>소개</h2>
        <p>한국고전문학과 전통 연희의 변이 양상, 그리고 고전 서사가 현대 문학에 미치는 영향을 주로 연구하고 있습니다. 이 페이지는 그동안 발표한 논문과 연구 자료를 모아둔 아카이브입니다.</p>
    </section>

    <section id="publications">
        <h2>주요 논문 및 저서</h2>
        <ul class="paper-list">

            <li class="paper-item">
                <a href="#" class="paper-title">판소리 사설과 전통 연희의 변이 양상 연구</a>
                <div class="paper-meta">학술지명 (2025) | KCI 등재지</div>
                <div class="paper-abstract">구비문학으로서 판소리가 지니는 현장성과 연행 환경의 변화에 따른 사설의 텍스트적 변이 과정을 분석함.</div>
            </li>
        </ul>
    </section>

</body>
</html>
